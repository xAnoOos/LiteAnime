{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .create-news-container {
        max-width: 750px;
        margin: 60px auto;
        background: linear-gradient(to bottom, #1e1e1e, #222);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        animation: fadeIn 1s ease-out;
        color: #fff;
    }

    .create-news-container h2 {
        color: #00d9ff;
        text-align: center;
        margin-bottom: 35px;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .form-label {
        color: #aaa;
        margin-bottom: 8px;
        display: block;
        font-weight: 500;
        font-size: 1.1rem;
    }

    .form-control {
        background-color: #2a2a2a;
        color: white;
        border: 1px solid #555;
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 25px;
        width: 100%;
        font-size: 1rem;
    }

    .btn-submit-news {
        background-color: #00d9ff;
        color: #000;
        border: none;
        border-radius: 25px;
        padding: 12px 32px;
        font-size: 1.1rem;
        font-weight: bold;
        display: block;
        margin: 0 auto;
        transition: background-color 0.3s ease, transform 0.2s ease;
        box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
    }

    .btn-submit-news:hover {
        background-color: #00bcd4;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="create-news-container">
    <h2>📝 Create News Post</h2>
    <form id="news-form">
        {% csrf_token %}
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" required>

        <label class="form-label">Content</label>
        <textarea name="content" class="form-control" rows="6" required></textarea>

        <label class="form-label">Image (optional)</label>
        <input type="file" name="image" class="form-control">

        <button type="submit" class="btn btn-submit-news mt-3">Post News</button>
    </form>

    <div id="response-message" class="mt-3 text-center"></div>
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.slice(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.getElementById('news-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);

        const res = await fetch('/news/api/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: formData,
            credentials: 'include'  
        });

        const msg = document.getElementById("response-message");

        if (res.ok) {
            const data = await res.json();
            window.location.href = `/news/${data.id}/`;
        } else {
            msg.innerHTML = `<p class="text-danger">❌ Failed to post news. Check your input or permissions.</p>`;
        }
    });
</script>

{% endblock %}
